name: Release

on:
  release:
    types: [created]

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'

      - name: Build Linux Binary
        run: |
          cd backend
          GOOS=linux GOARCH=amd64 go build -o ../argon-watch-go-linux ./cmd/server/main.go

      - name: Build Windows Binary
        run: |
          cd backend
          GOOS=windows GOARCH=amd64 go build -o ../argon-watch-go-windows.exe ./cmd/server/main.go

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            argon-watch-go-linux
            argon-watch-go-windows.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
